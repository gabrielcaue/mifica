# Configuração de Produção - Spring Boot
# Use variáveis de ambiente do Railway

spring.application.name=mifica-backend

# JWT - Use variável de ambiente
jwt.secret=${JWT_SECRET}
app.security.dev-mode=false
admin.cadastro.senha=${ADMIN_PASSWORD}
admin.redis.senha=${ADMIN_REDIS_PASSWORD}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:*}

# Banco de dados MySQL (Railway fornece)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexões otimizado
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging (reduzido para prod)
logging.level.root=INFO
logging.level.com.mifica=INFO

# Redis (Upstash em produção)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}

# Admin panel
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Server
server.port=8080
server.compression.enabled=true
server.compression.min-response-size=1024
