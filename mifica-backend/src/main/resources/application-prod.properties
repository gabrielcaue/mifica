# Configuração de Produção - Spring Boot
# Use variáveis de ambiente genéricas; mantém compatibilidade com variáveis legadas

spring.application.name=mifica-backend

# JWT - Use variável de ambiente
jwt.secret=${JWT_SECRET}
app.security.dev-mode=false
admin.cadastro.senha=${ADMIN_PASSWORD}
admin.redis.senha=${ADMIN_REDIS_PASSWORD}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:*}

# Banco de dados (provedor externo)
spring.datasource.url=jdbc:mysql://${DB_HOST:${MYSQLHOST}}:${DB_PORT:${MYSQLPORT}}/${DB_NAME:${MYSQLDATABASE}}
spring.datasource.username=${DB_USER:${MYSQLUSER}}
spring.datasource.password=${DB_PASSWORD:${MYSQLPASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexões otimizado
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Logging (reduzido para prod)
logging.level.root=INFO
logging.level.com.mifica=INFO

# Redis (Upstash em produção)
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL:true}

# Admin panel
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Server
server.port=8080
server.compression.enabled=true
server.compression.min-response-size=1024

# E-mail desabilitado - login sem verificação de email
# Configurações mantidas para compatibilidade futura com 2FA/MFA
# spring.mail.host=${MAIL_HOST:smtp.example.com}
# spring.mail.port=${MAIL_PORT:587}
app.backend.url=${PUBLIC_BACKEND_URL:${BACKEND_PUBLIC_URL:https://api.seu-dominio.com}}
