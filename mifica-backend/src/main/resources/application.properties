# Nome da aplicação
spring.application.name=mifica-backend

# JWT
jwt.secret=${JWT_SECRET}
app.security.dev-mode=true
admin.cadastro.senha=${ADMIN_PASSWORD}
app.cors.allowed-origin-patterns=*

# Banco de dados MySQL
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Faz o Spring Boot esperar e tentar novamente
spring.datasource.hikari.initializationFailTimeout=0
spring.datasource.hikari.connectionTimeout=30000

# Desabilita usuário padrão do Spring Security
spring.security.user.name=
spring.security.user.password=
spring.security.user.roles=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Desabilitar conf auto usuario em memória
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Redis (Upstash em produção, Docker local)
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# Senha admin para acesso ao consumer Redis
admin.redis.senha=${ADMIN_REDIS_PASSWORD}

management.endpoints.web.exposure.include=health,info,mappings

# E-mail (confirmação de cadastro) — desenvolvimento
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
app.mail.from=${MAIL_FROM:no-reply@mifica.app}
app.backend.url=${BACKEND_PUBLIC_URL:http://localhost:8080}