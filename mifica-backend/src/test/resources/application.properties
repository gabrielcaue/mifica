# Test profile defaults to avoid external MySQL dependency
spring.datasource.url=jdbc:h2:mem:mifica_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Keep Redis optional in local test runs
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.ssl.enabled=false

# Required placeholders with safe defaults for tests
jwt.secret=test-secret
admin.cadastro.senha=test-admin
admin.redis.senha=test-admin-redis
app.security.dev-mode=true
app.cors.allowed-origin-patterns=*

# Prevent mail/network requirements during tests
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=no-reply@mifica.test
app.backend.url=http://localhost:8080
