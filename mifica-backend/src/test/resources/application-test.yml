spring:
  # ✅ H2 Em Memória para Testes
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ✅ JPA com H2 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        dialect: org.hibernate.dialect.H2Dialect
        use_sql_comments: true

  # ✅ H2 Console para Debug (opcional)
  h2:
    console:
      enabled: false

  # ✅ CRÍTICO: Desabilitar APENAS OAuth2/SAML2 auto-configs
  # que causam problemas de contexto duplicado nos testes
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientWebSecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
      - org.springframework.boot.autoconfigure.security.saml2.Saml2RelyingPartyAutoConfiguration

  # ✅ Redis desativado para testes
  redis:
    enabled: false

# ✅ JWT para testes
jwt:
  secret: test-secret-key-for-testing-purposes-only
  expiration: 86400000
  refresh-token-expiration: 604800000

# ✅ Logs para debug
logging:
  level:
    com.mifica: DEBUG
    org.springframework.security: DEBUG
    org.springframework.test: DEBUG
    org.hibernate.SQL: DEBUG
    root: INFO
