apiVersion: apps/v1
kind: Deployment
metadata:
  name: mifica-frontend
  namespace: mifica
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mifica-frontend
  template:
    metadata:
      labels:
        app: mifica-frontend
    spec:
      containers:
        - name: mifica-frontend
          image: mifica/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mifica-frontend
  namespace: mifica
spec:
  selector:
    app: mifica-frontend
  ports:
    - port: 80
      targetPort: 80
