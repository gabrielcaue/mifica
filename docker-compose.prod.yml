version: "3.9"

name: mifica-prod

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: mifica-nginx
    restart: always
    depends_on:
      - mifica-frontend
      - mifica-backend
      - mifica-streamlit
    ports:
      - "80:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mifica-net

  mifica-frontend:
    build:
      context: ./mifica-frontend
      dockerfile: Dockerfile
    container_name: mifica-frontend
    restart: always
    expose:
      - "80"
    networks:
      - mifica-net

  mifica-backend:
    build:
      context: ./mifica-backend
      dockerfile: Dockerfile.prod
    container_name: mifica-backend
    restart: always
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_REDIS_PASSWORD: ${ADMIN_REDIS_PASSWORD}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS}

      MYSQLHOST: ${MYSQLHOST}
      MYSQLPORT: ${MYSQLPORT}
      MYSQLDATABASE: ${MYSQLDATABASE}
      MYSQLUSER: ${MYSQLUSER}
      MYSQLPASSWORD: ${MYSQLPASSWORD}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SSL: ${REDIS_SSL}

      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}
    networks:
      - mifica-net

  mifica-streamlit:
    build:
      context: ./mifica-streamlit
      dockerfile: Dockerfile
    container_name: mifica-streamlit
    restart: always
    expose:
      - "8501"
    command: >
      streamlit run app.py
      --server.baseUrlPath=streamlit
      --server.enableCORS=false
      --server.enableXsrfProtection=false
    networks:
      - mifica-net

networks:
  mifica-net:
    driver: bridge
