name: Deploy Backend to AWS EC2

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      ref_name:
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy backend to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          JWT_SECRET: ${{ secrets['JWT_SECRET'] }}
          ADMIN_PASSWORD: ${{ secrets['ADMIN_PASSWORD'] }}
          ADMIN_REDIS_PASSWORD: ${{ secrets['ADMIN_REDIS_PASSWORD'] }}
          DB_HOST: ${{ secrets['DB_HOST'] }}
          DB_PORT: ${{ secrets['DB_PORT'] }}
          DB_NAME: ${{ secrets['DB_NAME'] }}
          DB_USER: ${{ secrets['DB_USER'] }}
          DB_PASSWORD: ${{ secrets['DB_PASSWORD'] }}
          MYSQLHOST: ${{ secrets['MYSQLHOST'] }}
          MYSQLPORT: ${{ secrets['MYSQLPORT'] }}
          MYSQLDATABASE: ${{ secrets['MYSQLDATABASE'] }}
          MYSQLUSER: ${{ secrets['MYSQLUSER'] }}
          MYSQLPASSWORD: ${{ secrets['MYSQLPASSWORD'] }}
          REDIS_HOST: ${{ secrets['REDIS_HOST'] }}
          REDIS_PORT: ${{ secrets['REDIS_PORT'] }}
          REDIS_PASSWORD: ${{ secrets['REDIS_PASSWORD'] }}
          REDIS_SSL: ${{ secrets['REDIS_SSL'] }}
          REDIS_USERNAME: ${{ secrets['REDIS_USERNAME'] }}
          CORS_ALLOWED_ORIGIN_PATTERNS: ${{ secrets['CORS_ALLOWED_ORIGIN_PATTERNS'] }}
          MAIL_HOST: ${{ secrets['MAIL_HOST'] }}
          MAIL_PORT: ${{ secrets['MAIL_PORT'] }}
          MAIL_USERNAME: ${{ secrets['MAIL_USERNAME'] }}
          MAIL_PASSWORD: ${{ secrets['MAIL_PASSWORD'] }}
          MAIL_SMTP_AUTH: ${{ secrets['MAIL_SMTP_AUTH'] }}
          MAIL_SMTP_STARTTLS: ${{ secrets['MAIL_SMTP_STARTTLS'] }}
          MAIL_SMTP_CONNECTION_TIMEOUT_MS: ${{ secrets['MAIL_SMTP_CONNECTION_TIMEOUT_MS'] }}
          MAIL_SMTP_TIMEOUT_MS: ${{ secrets['MAIL_SMTP_TIMEOUT_MS'] }}
          MAIL_SMTP_WRITE_TIMEOUT_MS: ${{ secrets['MAIL_SMTP_WRITE_TIMEOUT_MS'] }}
          MAIL_FROM: ${{ secrets['MAIL_FROM'] }}
          BACKEND_PUBLIC_URL: ${{ secrets['BACKEND_PUBLIC_URL'] }}
          PUBLIC_BACKEND_URL: ${{ secrets['PUBLIC_BACKEND_URL'] }}
          GH_TOKEN: ${{ github.token }}
        with:
          host: ${{ secrets['AWS_EC2_HOST'] }}
          username: ${{ secrets['AWS_EC2_USER'] }}
          key: ${{ secrets['AWS_EC2_SSH_KEY'] }}
          script_stop: true
          envs: JWT_SECRET,ADMIN_PASSWORD,ADMIN_REDIS_PASSWORD,DB_HOST,DB_PORT,DB_NAME,DB_USER,DB_PASSWORD,MYSQLHOST,MYSQLPORT,MYSQLDATABASE,MYSQLUSER,MYSQLPASSWORD,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD,REDIS_SSL,REDIS_USERNAME,CORS_ALLOWED_ORIGIN_PATTERNS,MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,MAIL_SMTP_AUTH,MAIL_SMTP_STARTTLS,MAIL_SMTP_CONNECTION_TIMEOUT_MS,MAIL_SMTP_TIMEOUT_MS,MAIL_SMTP_WRITE_TIMEOUT_MS,MAIL_FROM,BACKEND_PUBLIC_URL,PUBLIC_BACKEND_URL,GH_TOKEN
          script: |
            set -euo pipefail

            if [ ! -d /opt/mifica ]; then
              sudo mkdir -p /opt/mifica
              sudo chown -R "$USER:$USER" /opt/mifica
            fi

            cd /opt/mifica

            repo_url="https://x-access-token:${GH_TOKEN}@github.com/${{ inputs.repository }}.git"

            if [ ! -d .git ]; then
              git clone "$repo_url" .
            else
              git remote set-url origin "$repo_url"
            fi

            git fetch --all --prune
            git checkout -B "${{ inputs.ref_name }}" "origin/${{ inputs.ref_name }}"
            git pull --ff-only origin "${{ inputs.ref_name }}"

            cd mifica-backend

            docker build -f Dockerfile.prod -t mifica-backend:latest .
            docker rm -f mifica-backend || true

            docker run -d \
              --name mifica-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              -e JWT_SECRET="$JWT_SECRET" \
              -e ADMIN_PASSWORD="$ADMIN_PASSWORD" \
              -e ADMIN_REDIS_PASSWORD="$ADMIN_REDIS_PASSWORD" \
              -e DB_HOST="$DB_HOST" \
              -e DB_PORT="$DB_PORT" \
              -e DB_NAME="$DB_NAME" \
              -e DB_USER="$DB_USER" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e MYSQLHOST="$MYSQLHOST" \
              -e MYSQLPORT="$MYSQLPORT" \
              -e MYSQLDATABASE="$MYSQLDATABASE" \
              -e MYSQLUSER="$MYSQLUSER" \
              -e MYSQLPASSWORD="$MYSQLPASSWORD" \
              -e REDIS_HOST="$REDIS_HOST" \
              -e REDIS_PORT="${REDIS_PORT:-6379}" \
              -e REDIS_PASSWORD="$REDIS_PASSWORD" \
              -e REDIS_SSL="${REDIS_SSL:-true}" \
              -e REDIS_USERNAME="${REDIS_USERNAME:-default}" \
              -e CORS_ALLOWED_ORIGIN_PATTERNS="${CORS_ALLOWED_ORIGIN_PATTERNS:-*}" \
              -e MAIL_HOST="$MAIL_HOST" \
              -e MAIL_PORT="$MAIL_PORT" \
              -e MAIL_USERNAME="$MAIL_USERNAME" \
              -e MAIL_PASSWORD="$MAIL_PASSWORD" \
              -e MAIL_SMTP_AUTH="$MAIL_SMTP_AUTH" \
              -e MAIL_SMTP_STARTTLS="$MAIL_SMTP_STARTTLS" \
              -e MAIL_SMTP_CONNECTION_TIMEOUT_MS="$MAIL_SMTP_CONNECTION_TIMEOUT_MS" \
              -e MAIL_SMTP_TIMEOUT_MS="$MAIL_SMTP_TIMEOUT_MS" \
              -e MAIL_SMTP_WRITE_TIMEOUT_MS="$MAIL_SMTP_WRITE_TIMEOUT_MS" \
              -e MAIL_FROM="$MAIL_FROM" \
              -e BACKEND_PUBLIC_URL="$BACKEND_PUBLIC_URL" \
              -e PUBLIC_BACKEND_URL="$PUBLIC_BACKEND_URL" \
              mifica-backend:latest